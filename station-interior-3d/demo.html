// ═══════════════════════════════════════════════════════════════════════════════
// VERTEX COLOUR HELPER
// ═══════════════════════════════════════════════════════════════════════════════
function applyVC(geo, fn) {
  const pos = geo.attributes.position;
  const arr = new Float32Array(pos.count * 3);
  for (let i = 0; i < pos.count; i++) {
    const c = fn(pos.getY(i), i);
    arr[i*3] = c.r; arr[i*3+1] = c.g; arr[i*3+2] = c.b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(arr, 3));
  return geo;
}

// ═══════════════════════════════════════════════════════════════════════════════
// HANGAR SHELL
// ═══════════════════════════════════════════════════════════════════════════════
function HangarGeometry() {
  const wallMat  = useMemo(() => new THREE.MeshLambertMaterial({ vertexColors:true, side:THREE.BackSide }), []);
  const floorMat = useMemo(() => new THREE.MeshLambertMaterial({ vertexColors:true }), []);

  const voidMat  = useMemo(() => new THREE.MeshLambertMaterial({ color:new THREE.Color('#000510'), transparent:true, opacity:0.7, side:THREE.DoubleSide }), []);

  const wallGeo = useMemo(() => {
    const g = new THREE.BoxGeometry(40, 20, 60, 4, 4, 6);
    return applyVC(g, y => new THREE.Color().lerpColors(PAL.wall, PAL.wallLight, ((y+10)/20)*0.5));
  }, []);

  const floorGeo = useMemo(() => {
    const g = new THREE.PlaneGeometry(40, 60, 8, 12);
    return applyVC(g, (_, i) => (Math.floor(i/9)%2===0 ? PAL.floor : PAL.floorGrid));
  }, []);

  return React.createElement(React.Fragment, null,
    // Main shell
    React.createElement('mesh', { geometry:wallGeo, material:wallMat, receiveShadow:true }),
    // Floor

    React.createElement('mesh', { material:trimMat, position:[19.8,0,-30] },
      React.createElement('boxGeometry', { args:[0.3,20,0.3] })),
    // Gateway horizontal trim

// ═══════════════════════════════════════════════════════════════════════════════
// DOCKING PAD
// ═══════════════════════════════════════════════════════════════════════════════
function DockingPad({ docked }) {
  const lights = useRef([]);
  const t = useRef(0);

  useFrame((_,dt) => {
    t.current += dt;
    lights.current.forEach((m,i) => {
      if (!m) return;
      const p = 0.5 + 0.5*Math.sin(t.current*2.2 + i*1.05);
      m.emissiveIntensity = docked ? 0.3+p*1.0 : 0.08+p*0.12;
      m.color.set(docked ? PAL.accent : PAL.glow);
      m.emissive.set(docked ? PAL.accent : PAL.glow);
    });
  });

  const hexPts = useMemo(() => Array.from({length:6},(_,i)=>{
    const a=(i/6)*Math.PI*2; return [Math.cos(a)*6.5, Math.sin(a)*6.5];
  }),[]);

  return React.createElement('group', { position:[0,-9.9,8] },
    // Base slab
    React.createElement('mesh', { receiveShadow:true, rotation:[-Math.PI/2,0,0] },
      React.createElement('cylinderGeometry', { args:[6.5,7,0.3,6] }),
      React.createElement('meshLambertMaterial', { color:PAL.padBase })),
    // Light segments
    ...hexPts.map(([x,z],i) =>
      React.createElement('mesh', {
        key:i,
        position:[x,0.18,z],
        ref:el=>{ if(el) lights.current[i]=el.material }
      },
        React.createElement('boxGeometry', { args:[0.5,0.14,2.8] }),
        React.createElement('meshLambertMaterial', { color:PAL.glow, emissive:PAL.glow, emissiveIntensity:0.2 }))),
    // Cross markers

      React.createElement('planeGeometry', { args:[0.25,12] }),
      React.createElement('meshLambertMaterial', { color:PAL.accent, emissive:PAL.accent, emissiveIntensity:0.8 })),
    React.createElement('mesh', { rotation:[-Math.PI/2,0,0], position:[0,0.22,0] },
      React.createElement('planeGeometry', { args:[12,0.25] }),
      React.createElement('meshLambertMaterial', { color:PAL.accent, emissive:PAL.accent, emissiveIntensity:0.8 }))
  );
}

        React.createElement('meshLambertMaterial', { color:PAL.glowWarm, emissive:PAL.glowWarm, emissiveIntensity:1.4 })),
      React.createElement('pointLight', { color:'#ff8c00', intensity:1.2, distance:4, position:[0,0.9,0] }))

// ═══════════════════════════════════════════════════════════════════════════════
// NPC SHUTTLE
// ═══════════════════════════════════════════════════════════════════════════════
function NPCShuttle({ color, path, speed, offset=0 }) {
  const ref = useRef();
  const t = useRef(offset);

  useFrame((_,dt) => {
    t.current = (t.current + dt*speed) % 1;
    const pt = path.getPoint(t.current);
    const ah = path.getPoint((t.current+0.01)%1);
    if (ref.current) { ref.current.position.copy(pt); ref.current.lookAt(ah); }
  });

  return React.createElement('group', { ref },
    React.createElement('mesh', { castShadow:true },  // GLB_SLOT: 1
      React.createElement('boxGeometry', { args:[0.9,0.46,2.4] }),
      React.createElement('meshLambertMaterial', { color })),
    React.createElement('mesh', { position:[0,0.28,-0.55] },
      React.createElement('boxGeometry', { args:[0.52,0.32,0.55] }),
      React.createElement('meshLambertMaterial', { color:PAL.glow, emissive:PAL.glow, emissiveIntensity:0.35, transparent:true, opacity:0.8 })),
    React.createElement('mesh', { position:[0,0,1.25] },

    React.createElement('pointLight', { color:'#ff8c00', intensity:0.6, distance:5, position:[0,0,1.5] })

}

function NPCTraffic() {
  const paths = useMemo(() => {
    const p1 = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-15,-4,-20), new THREE.Vector3(15,-3,-20),
      new THREE.Vector3(18,-5,0),    new THREE.Vector3(14,-4,20),
      new THREE.Vector3(-14,-6,20),  new THREE.Vector3(-18,-4,0),
    ], true);
    const p2 = new THREE.CatmullRomCurve3([
      new THREE.Vector3(10,2,-24),  new THREE.Vector3(-12,1,-14),
      new THREE.Vector3(-16,3,5),   new THREE.Vector3(-8,2,22),
      new THREE.Vector3(12,1,22),   new THREE.Vector3(16,3,5),
    ], true);
    return [p1,p2];
  },[]);

  return React.createElement(React.Fragment, null,
    React.createElement(NPCShuttle, { color:PAL.npcA, path:paths[0], speed:0.055, offset:0 }),
    React.createElement(NPCShuttle, { color:PAL.npcB, path:paths[0], speed:0.055, offset:0.5 }),
    React.createElement(NPCShuttle, { color:PAL.npcA, path:paths[1], speed:0.038, offset:0.3 })
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DUST PARTICLES
// ═══════════════════════════════════════════════════════════════════════════════
function DustParticles() {
  const ref = useRef();
  const N = 350;

  const [pos, vel] = useMemo(() => {
    const p = new Float32Array(N*3), v = new Float32Array(N*3);
    for (let i=0;i<N;i++) {
      p[i*3]   = (Math.random()-.5)*38;
      p[i*3+1] = Math.random()*18-9;
      p[i*3+2] = (Math.random()-.5)*58;
      v[i*3]   = (Math.random()-.5)*.009;
      v[i*3+1] = (Math.random()-.5)*.004;
      v[i*3+2] = (Math.random()-.5)*.009;
    }
    return [p,v];
  },[]);

  useFrame(() => {
    if (!ref.current) return;
    const p = ref.current.geometry.attributes.position.array;
    for (let i=0;i<N;i++) {
      p[i*3]   += vel[i*3];   if (Math.abs(p[i*3])>19)   p[i*3]   *=-1;
      p[i*3+1] += vel[i*3+1]; if (Math.abs(p[i*3+1])>9)  p[i*3+1] *=-1;
      p[i*3+2] += vel[i*3+2]; if (Math.abs(p[i*3+2])>29) p[i*3+2] *=-1;
    }
    ref.current.geometry.attributes.position.needsUpdate = true;
  });

  return React.createElement('points', { ref },
    React.createElement('bufferGeometry', null,
      React.createElement('bufferAttribute', { attach:'attributes-position', args:[pos,3] })),
    React.createElement('pointsMaterial', { color:PAL.glow, size:0.06, transparent:true, opacity:0.35, sizeAttenuation:true })
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// CAMERA RIG
// ═══════════════════════════════════════════════════════════════════════════════
function CameraRig({ docked }) {
  const { camera } = useThree();
  const t = useRef(0);
  const tPos  = useRef(new THREE.Vector3(0,2,22));
  const tLook = useRef(new THREE.Vector3(0,-2,0));
  const cLook = useRef(new THREE.Vector3(0,-2,0));

  useEffect(() => { camera.position.set(0,2,22); camera.lookAt(0,-2,0); }, []);

  useFrame((_,dt) => {
    t.current += dt;
    if (docked) {
      tPos.current.set(Math.sin(t.current*.15)*8, -1+Math.sin(t.current*.2)*1.5, 14+Math.sin(t.current*.1)*3);
      tLook.current.set(0,-4,5);
    } else {
      const r=22, a=t.current*.1;
      tPos.current.set(Math.sin(a)*r, 3+Math.sin(t.current*.07)*2, Math.cos(a)*r);
      tLook.current.set(0,-2,5);
    }
    camera.position.lerp(tPos.current, dt*1.1);
    cLook.current.lerp(tLook.current, dt*1.4);
    camera.lookAt(cLook.current);
  });

  return null;
}

      React.createElement(DockingPad,  { docked }),
      React.createElement(PlayerShip, { docked }),
      React.createElement(NPCTraffic),
      React.createElement(DustParticles),
      React.createElement(CameraRig,  { docked })
    ),
    // ── Overlays ──
    React.createElement('div', { style:S.scanlines }),
    React.createElement('div', { style:S.vignette  }),
    React.createElement('div', { style:S.nameplate },
      React.createElement('span',{style:{color:'#00ffcc',fontSize:14}},'◈'),
      ' Astra Prime — Docking Bay 7'),
    !docked && React.createElement(DockHUD, { onDock:handleDock }),
    React.createElement(ServicesMenu, { visible:showServices, onUndock:handleUndock,
      onSelect:id=>console.log('Service selected:', id) })
  );
}
